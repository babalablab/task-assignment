# @package _global_
defaults:
  - override /trainer: spiral
  - override /dataset: spiral_test_num
  - override /model : confusion

trainer:
  loss:
    _target_: train.loss.LossConfusion
    alpha: 0.01
    beta: 1
  matching_model:
    _target_: model.CostConstraint
    annotator_num: ${annotator_num}
    cost_per_annotator: [0.2, 0.5, 0.3]
    total_cost_per_annotator: [300, 100, 300]
    seed: ${trainer.seed}
  weight_model:
    _target_: model.ConfusionModel
    input_dim: 2
    hidden_dim: 4
    out_dim: 3
    annotator_num: ${annotator_num}
    layer_num: 3
    
annotator_num: 3
