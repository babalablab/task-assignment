name: hatexplain_vocab
sampling_rate: 1.0

train_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 64
  debug: ${debug}
  mode: train
  data_name: hatexplain
  output_dir: data/hatexplain_vocab/
  model_name: google-bert/bert-base-uncased
  sampling_rate: ${dataset.sampling_rate}
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}


valid_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 64
  debug: ${debug}
  mode: validation
  data_name: hatexplain
  output_dir: data/hatexplain_vocab/
  model_name: google-bert/bert-base-uncased 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}

test_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 64
  debug: ${debug}
  mode: test
  data_name: hatexplain
  output_dir: data/hatexplain_vocab/
  model_name: google-bert/bert-base-uncased 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}
