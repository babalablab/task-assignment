name: ethos
train_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 1024
  debug: ${debug}
  mode: train
  data_name: ethos
  output_dir: data/ethos/
  model_name: pursuitofds/finetuned_sentiment_bert_base_model 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.EthosPreprocess
    output_dir: ${dataset.train_dataset.output_dir}


valid_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 1024
  debug: ${debug}
  mode: validation
  data_name: ethos
  output_dir: data/ethos/
  model_name: pursuitofds/finetuned_sentiment_bert_base_model 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.EthosPreprocess
    output_dir: ${dataset.train_dataset.output_dir}

test_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 1024
  debug: ${debug}
  mode: test
  data_name: ethos
  output_dir: data/ethos/
  model_name: pursuitofds/finetuned_sentiment_bert_base_model 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.EthosPreprocess
    output_dir: ${dataset.train_dataset.output_dir}
