name: imdb
train_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: train
  data_name: imdb
  output_dir: data/imdb/
  model_name: pursuitofds/finetuned_sentiment_bert_base_model 
  seed: ${trainer.seed}
  preprocess:
    _target_: preprocess.sentiment_analysis.IMDBPreprocess
    output_dir: ${dataset.train_dataset.output_dir}
    seed: ${trainer.seed}


