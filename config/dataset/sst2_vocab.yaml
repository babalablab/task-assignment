name: sst2_vocab
sampling_rate: 1
filter_ratio: 0


train_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: train
  data_name: sst2
  output_dir: data/sst2_vocab/
  model_name: syedkhalid076/RoBERTa-Sentimental-Analysis-Model
  filter_ratio: ${dataset.filter_ratio}
  seed: 10
  sampling_rate: ${dataset.sampling_rate}
  preprocess:
    _target_: preprocess.sentiment_analysis.SST2PreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}

valid_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: validation
  data_name: sst2
  output_dir: data/sst2_vocab/
  model_name: syedkhalid076/RoBERTa-Sentimental-Analysis-Model 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.SST2PreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}

test_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: test
  data_name: sst2
  output_dir: data/sst2_vocab/
  model_name: syedkhalid076/RoBERTa-Sentimental-Analysis-Model 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.SST2PreprocessVocab
    output_dir: ${dataset.train_dataset.output_dir}
