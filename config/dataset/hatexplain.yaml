name: hatexplain
train_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: train
  data_name: hatexplain
  output_dir: data/hatexplain/
  model_name: google-bert/bert-base-uncased 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocess
    output_dir: ${dataset.train_dataset.output_dir}


valid_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: validation
  data_name: hatexplain
  output_dir: data/hatexplain/
  model_name: google-bert/bert-base-uncased 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocess
    output_dir: ${dataset.train_dataset.output_dir}

test_dataset:
  _target_: dataset.sentiment_analysis.SentimentAnalysisDataset
  batch_size: 32
  debug: ${debug}
  mode: test
  data_name: hatexplain
  output_dir: data/hatexplain/
  model_name: google-bert/bert-base-uncased 
  seed: 10
  preprocess:
    _target_: preprocess.sentiment_analysis.HateXplainPreprocess
    output_dir: ${dataset.train_dataset.output_dir}
