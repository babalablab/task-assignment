volumes:
  venv:

services:
    Human_LLM_collaborative_annotation:
        build:
            context: .
            dockerfile: Dockerfile
        image: Human_LLM_collaborative_annotation
        volumes:
          - type: bind
            source: .
            target: /app
          - /app/.venv
          - /app/.cache
        environment:
          NVIDIA_VISIBLE_DEVICES: all
          NVIDIA_DRIVER_CAPABILITIES: all
        deploy:
          resources:
            reservations:
              devices:
                - capabilities:
                    - gpu
        command: tail -f /dev/null
        container_name: Human_LLM_collaborative_annotation
